name: Docker Image CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build
        run: |
          if [ -n "${{ vars.DOCKER_BUILD_DIR }}" ]; then
            DOCKERFILE="${{ vars.DOCKER_BUILD_DIR }}/Dockerfile"
          else
            DOCKERFILE="Dockerfile"
          fi
        
          docker buildx build \
            --build-arg GIT_SHA=$(git rev-parse --short HEAD) \
            -t ${{ vars.DOCKER_IMAGE }}:latest \
            -t ${{ vars.DOCKER_IMAGE }}:${{ env.SHORT_SHA }} \
            -f "$DOCKERFILE" \
            --attest type=provenance,mode=max,version=v1 \
            --sbom=true \
            ${{ vars.DOCKER_BUILD_DIR || '.' }}
  push:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push
        run: docker push ${{ vars.DOCKER_IMAGE }}
