name: Deploy to Fly.io

on:
  workflow_run:
    workflows:
      - "Docker Image CI"
      - "CodeQL Advanced"
    branches:
      - main
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  gate:
    name: Wait for All Required Workflows
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check all required workflows succeeded
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const required = ['Docker Image CI', 'CodeQL Advanced'];

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              per_page: 100,
            });

            let allPassed = true;
            for (const name of required) {
              const run = data.workflow_runs.find(
                r => r.name === name && r.status === 'completed'
              );
              if (!run) {
                console.log(`'${name}' has not completed yet for ${sha}`);
                allPassed = false;
              } else if (run.conclusion !== 'success') {
                console.log(`'${name}' concluded with '${run.conclusion}' for ${sha}`);
                allPassed = false;
              } else {
                console.log(`'${name}' succeeded for ${sha}`);
              }
            }

            core.setOutput('should_deploy', String(allPassed));

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pytest -r requirements.txt && pip install httpx2
        working-directory: server

      - name: Run tests
        run: pytest
        working-directory: server

  deploy-dev:
    name: Deploy To Railway
    needs: [gate, test]
    if: |
      needs.gate.outputs.should_deploy == 'true' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway redeploy -s image2 --yes
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}

  deploy-prod:
    name: Deploy to Fly.io
    needs: [gate, test]
    if: |
      needs.gate.outputs.should_deploy == 'true' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.toml --remote-only
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
