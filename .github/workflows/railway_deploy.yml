name: Deploy to Railway (Preview)

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'server/**'

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pytest -r requirements.txt && pip install httpx2
        working-directory: server

      - name: Run tests
        run: pytest
        working-directory: server

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway redeploy -s image2 --yes
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}
