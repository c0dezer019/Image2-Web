name: Docker Image CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'

permissions:
  contents: read

jobs:
  gate:
    name: Wait for All Required Workflows
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check all required workflows succeeded
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const required = ['CodeQL Advanced'];

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              per_page: 100,
            });

            let allPassed = true;
            for (const name of required) {
              const run = data.workflow_runs.find(
                r => r.name === name && r.status === 'completed'
              );
              if (!run) {
                console.log(`'${name}' has not completed yet for ${sha}`);
                allPassed = false;
              } else if (run.conclusion !== 'success') {
                console.log(`'${name}' concluded with '${run.conclusion}' for ${sha}`);
                allPassed = false;
              } else {
                console.log(`'${name}' succeeded for ${sha}`);
              }
            }

            core.setOutput('should_deploy', String(allPassed));
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build
        run: |
          if [ -n "${{ vars.DOCKER_BUILD_DIR }}" ]; then
            DOCKERFILE="${{ vars.DOCKER_BUILD_DIR }}/Dockerfile"
          else
            DOCKERFILE="Dockerfile"
          fi

          PUSH_FLAG=""
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            PUSH_FLAG="--push"
          fi
        
          docker buildx build \
            --build-arg GIT_SHA=$(git rev-parse --short HEAD) \
            -t ${{ vars.DOCKER_IMAGE }}:latest \
            -t ${{ vars.DOCKER_IMAGE }}:${{ env.SHORT_SHA }} \
            -f "$DOCKERFILE" \
            --attest type=provenance,mode=max,version=v1 \
            --sbom=true \
            $PUSH_FLAG \
            ${{ vars.DOCKER_BUILD_DIR || '.' }}
